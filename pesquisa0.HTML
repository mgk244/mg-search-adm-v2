<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGoogle V2 - Privado</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Tela de Login */
        #login-screen { position: fixed; inset: 0; background: #121212; z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .login-box { width: 85%; max-width: 300px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 30px; border: 1px solid #3c4043; background: #202124; color: #fff; box-sizing: border-box; outline: none; text-align: center; font-size: 16px; }
        .btn-go { width: 100%; padding: 15px; background: #8ab4f8; border: none; border-radius: 30px; color: #202124; font-weight: bold; cursor: pointer; }

        /* Interface de Busca */
        #home-center { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .logo { font-size: 60px; font-weight: bold; margin-bottom: 20px; }
        .search-container { width: 100%; max-width: 500px; }

        /* Navegador (Iframe) */
        #viewport { flex-grow: 1; border: none; width: 100%; height: 100%; display: none; background: #fff; }

        /* Botão Home */
        #btn-home { 
            position: fixed; bottom: 20px; right: 20px; 
            background: #4285F4; width: 55px; height: 55px; 
            border-radius: 50%; display: none; align-items: center; 
            justify-content: center; cursor: pointer; z-index: 1000; 
            font-size: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div class="logo"><span style="color:#4285F4">M</span><span style="color:#EA4335">G</span></div>
        <input type="text" id="user" placeholder="Nome de Usuário">
        <input type="password" id="pass" placeholder="Sua Key">
        <button class="btn-go" onclick="logar()">ACESSAR</button>
    </div>
</div>

<div id="home-center">
    <div class="logo"><span style="color:#4285F4">M</span><span style="color:#EA4335">G</span><span style="color:#FBBC05">o</span><span style="color:#34A853">o</span><span style="color:#EA4335">g</span><span style="color:#4285F4">l</span><span style="color:#EA4335">e</span></div>
    <div class="search-container">
        <input type="text" id="query" placeholder="Pesquisa privada..." onkeypress="if(event.key==='Enter') pesquisar()">
    </div>
</div>

<div id="btn-home" onclick="voltar()">🏠</div>

<iframe id="viewport" name="viewport"></iframe>

<script>
    let logadoUser, logadoKey;

    function logar() {
        logadoUser = document.getElementById('user').value;
        logadoKey = document.getElementById('pass').value;
        if(logadoUser && logadoKey) {
            document.getElementById('login-screen').style.display = 'none';
        }
    }

    function pesquisar() {
        let q = document.getElementById('query').value;
        if(!q) return;

        // URL formatada para abrir no Iframe sem conta logada
        let url = q.includes('.') ? (q.startsWith('http') ? q : 'https://'+q) : 'https://www.google.com/search?q='+encodeURIComponent(q)+'&igu=1';

        document.getElementById('home-center').style.display = 'none';
        document.getElementById('btn-home').style.display = 'flex';
        const frame = document.getElementById('viewport');
        frame.src = url;
        frame.style.display = 'block';

        // SALVA NO BANCO PARA O ADM
        let db = JSON.parse(localStorage.getItem('MG_DATA')) || {};
        if(!db[logadoKey]) db[logadoKey] = { user: logadoUser, logs: [] };
        db[logadoKey].logs.push({ id: Date.now(), t: q, u: url, d: new Date().toLocaleString() });
        localStorage.setItem('MG_DATA', JSON.stringify(db));
    }

    function voltar() {
        document.getElementById('viewport').style.display = 'none';
        document.getElementById('viewport').src = 'about:blank';
        document.getElementById('home-center').style.display = 'flex';
        document.getElementById('btn-home').style.display = 'none';
        document.getElementById('query').value = '';
    }
</script>
</body>
</html>
