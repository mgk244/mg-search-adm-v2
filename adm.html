<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MG - MASTER ADM</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .card { border: 1px solid #0f0; padding: 15px; margin: 15px 0; background: rgba(0, 20, 0, 0.4); position: relative; }
        .secret { color: #003300; }
        button { background: #0f0; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; margin: 5px 2px; }
        .btn-del-user { background: #ff0000; color: #fff; position: absolute; top: 15px; right: 15px; }
        .log-row { border-bottom: 1px solid #003300; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .btn-trash { background: #ff4444; color: #fff; padding: 3px 8px; font-size: 11px; }
        a { color: #0f0; text-decoration: none; border-bottom: 1px solid #0f0; }
    </style>
</head>
<body>

    <h1>> MG_DATABASE_V2_ONLINE</h1>
    
    <div id="login">
        <input type="password" id="mKey" style="background:#000; border:1px solid #0f0; color:#0f0; padding:12px; width: 250px;" placeholder="Master Key">
        <button onclick="entrar()">DESBLOQUEAR</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div id="lista"></div>
    </div>

<script>
    const MASTER_KEY = "\\HISTORICO-MG/";

    function entrar() {
        if(document.getElementById('mKey').value === MASTER_KEY) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            render();
        }
    }

    function render() {
        const list = document.getElementById('lista');
        const db = JSON.parse(localStorage.getItem('MG_DATA')) || {};
        list.innerHTML = "";

        for(let key in db) {
            let u = db[key];
            let div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <button class="btn-del-user" onclick="killUser('${key}')">APAGAR USUÁRIO</button>
                <strong>LOGIN:</strong> <span class="secret" id="u-${key}">***</span> | 
                <strong>KEY:</strong> <span class="secret" id="k-${key}">***</span>
                <div style="margin-top:10px;">
                    <button onclick="reveal('${key}', '${u.user}', '${key}')">👁️ REVELAR</button>
                    <button onclick="showLogs('${key}')">📂 HISTÓRICO</button>
                </div>
                <div id="logs-${key}" style="display:none; margin-top:15px; border-top:1px solid #0f0; padding-top:10px;">
                    ${u.logs.map(l => `
                        <div class="log-row">
                            <span>[${l.d}] <a href="${l.u}" target="_blank">${l.t}</a></span>
                            <button class="btn-trash" onclick="killLog('${key}', ${l.id})">🗑️</button>
                        </div>
                    `).join('') || "Sem histórico."}
                </div>
            `;
            list.appendChild(div);
        }
    }

    function reveal(id, u, k) {
        let ue = document.getElementById(`u-${id}`);
        let ke = document.getElementById(`k-${id}`);
        ue.innerText = (ue.innerText === "***") ? u : "***";
        ke.innerText = (ke.innerText === "***") ? k : "***";
    }

    function showLogs(id) {
        let el = document.getElementById(`logs-${id}`);
        el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    }

    function killLog(ukey, lid) {
        let db = JSON.parse(localStorage.getItem('MG_DATA'));
        db[ukey].logs = db[ukey].logs.filter(l => l.id !== lid);
        localStorage.setItem('MG_DATA', JSON.stringify(db));
        render();
    }

    function killUser(key) {
        if(confirm("Apagar usuário e todas as pesquisas dele?")) {
            let db = JSON.parse(localStorage.getItem('MG_DATA'));
            delete db[key];
            localStorage.setItem('MG_DATA', JSON.stringify(db));
            render();
        }
    }
</script>
</body>
</html>
